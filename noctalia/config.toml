[bar.main]
background_opacity = 0.93000000000000005
center = [ "workspaces" ]
end = [ "tray", "notifications", "battery", "volume", "brightness", "control-center" ]
margin_ends = 20
position = "top"
radius = 12
shadow = true
start = [ "launcher", "clock", "group:g1", "active_window", "media" ]

    [[bar.main.capsule_group]]
    fill = "surface_variant"
    id = "g1"
    members = [ "cpu", "ram", "temp" ]
    opacity = 1.0
    padding = 6.0

[dock]
auto_hide = true
enabled = true
position = "bottom"

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@HDMI-A-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 1280.0
    cy = 1321.0
    output = "HDMI-A-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

[notification]
background_opacity = 1.0
position = "top_right"

[osd]
background_opacity = 1.0
position = "top_right"

[shell]
avatar_path = "/home/png/.face"
clipboard_enabled = true
font_family = "sans-serif"
telemetry_enabled = false

    [shell.panel]
    launcher_categories = true
    launcher_placement = "centered"
    launcher_session_search = true
    launcher_sort_by_usage = true

[theme]
builtin = "Catppuccin"
mode = "dark"
source = "builtin"

    [theme.templates]
    builtin_ids = [ "hyprland", "kitty" ]
    enable_builtin_templates = true

[wallpaper]
directory = "/home/png/Pictures/Wallpapers"
enabled = true
fill_mode = "crop"

[weather]
effects = true
enabled = true
unit = "celsius"

[widget.active_window]
max_length = 145.0

[widget.clock]
format = "{:%H:%M %a, %b %d}"

[widget.media]
max_length = 145.0
